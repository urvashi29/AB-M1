<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <header></header>

    <main>
      <section>
        <form
          method="post"
          action="./submit.html"
          target="_self"
          autocomplete="off"
        >
          <label for="username">Enter Username</label>
          <input
            type="text"
            placeholder="Please enter name"
            name="username"
            id="username"
            value="user123"
            readonly
            style="width: 200px"
          />

          <label for="age">Enter Age</label>
          <input
            type="number"
            name="age"
            placeholder="Please enter age"
            disabled
          />
          <br />

          <label for="email">Enter Email</label>
          <input
            type="email"
            placeholder="Please enter email"
            name="email"
            autofocus
          />

          <label for="pwd">Enter password</label>
          <input
            type="password"
            placeholder="Please enter password"
            name="pwd"
            minlength="6"
            maxlength="10"
          />

          <!-- radio  -->
          <label for="male">M</label>
          <input type="radio" value="male" name="gender" />
          <label for="female">F</label>
          <input type="radio" value="female" name="gender" />

          <label for="contact">Contact</label>
          <input type="tel" placeholder="Please enter contact" name="contat" />

          <label for="birthday">Select Birthday</label>
          <input type="date" name="birthday" />

          <label for="price">Price</label>
          <input type="range" min="0" max="10000" name="price" />

          <label for="file">Select resume</label>
          <input type="file" name="file" multiple />

          <label for="agree">I agree</label>
          <input type="checkbox" name="agree" />

          <!-- dropdown  -->
          <label for="department"
            >Select the department you want to search in</label
          >
          <select name="department">
            <option value="arts">Arts & Craft</option>
            <option value="book">Book</option>
            <optgroup label="Electronics">
              <option value="computers">Computers</option>
              <option value="tv">TV</option>
            </optgroup>
          </select>

          <label for="about">About Yourself</label>
          <textarea name="about" row="60" cols="60"></textarea>

          <input type="reset" />
          <button type="submit">Submit</button>
          <button type="submit" disabled>Signup</button>
        </form>
      </section>

      <section>
        <form>
          <fieldset>
            <legend>Contact Us</legend>
            <label for="email">Enter Email</label>
            <input
              type="email"
              placeholder="Please enter email"
              name="email"
              autofocus
            />

            <label for="pwd">Enter password</label>
            <input
              type="password"
              placeholder="Please enter password"
              name="pwd"
              minlength="6"
              maxlength="10"
            />
          </fieldset>

          <fieldset>
            <legend>Academic Details</legend>
            <label for="username">Enter Username</label>
            <input
              type="text"
              placeholder="Please enter name"
              name="username"
              id="username"
            />
          </fieldset>
        </form>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
