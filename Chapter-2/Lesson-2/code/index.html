<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <header></header>

    <!-- External Linking  -->
    <nav>
      <!-- a -> anchor  -->
      <a href="./about.html" target="_blank">About</a>
      <a href="./contact.html" target="_self">Contact</a>
      <a href="./products.html">Products</a>
    </nav>

    <main>
      <section>
        <!-- Media elements  -->
        <img src="" alt="" />
        <video
          src="./video/video.mp4"
          alt="earth"
          controls
          autoplay
          muted
        ></video>

        <audio
          src="./audio/file_example_MP3_700KB.mp3"
          alt="audio"
          controls
          autoplay
          muted
        ></audio>

        <iframe
          src="https://file-examples.com/index.php/sample-audio-files/sample-mp3-download/"
        ></iframe>

        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/kBo3ipDEH6k?si=Uv1HfoPj9XJTZ8zL"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>

    <footer>
      <a href="https://www.facebook.com/" target="_blank">
        <img
          src="./images/facebook.jpg"
          alt="facebook"
          style="width: 60px; height: 60px"
        />
      </a>
    </footer>
  </body>
</html>
